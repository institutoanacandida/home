<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Instituto Ana Cândida | Referência em Terapia Sistêmica</title>

    <meta name="description" content="Especialista em Terapia Sistêmica e Reconexão Feminina. Conheça o Instituto Ana Cândida." />
    <meta name="author" content="Ana Cândida" />

    <meta property="og:title" content="Instituto Ana Cândida" />
    <meta property="og:description" content="Especialista em Terapia Sistêmica e Reconexão Feminina." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://institutoanacandida.github.io/home/" />
    <meta property="og:image" content="https://ibb.co/67X3xfSV" />

    <link rel="icon" type="image/png" sizes="16x16" href="https://i.ibb.co/HLfD5wgf/dualite-favicon.png" />

    <script type="module" crossorigin src="./assets/index-kqu_jrfc.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/index-dct7n55f.css">
    
    <script>
      // Fix para o React Router no GitHub Pages (subpasta /home/)
      // Este script "engana" o roteador fazendo-o acreditar que está na raiz
      (function() {
        const repo = '/home';
        if (window.location.pathname === repo || window.location.pathname === repo + '/') {
          window.history.replaceState(null, '', repo + '/#/');
        }
      })();
    </script>
    
    <style>
      /* Ajuste fino para garantir que o site carregue bem no subdiretório */
      #root { min-height: 100vh; }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script>
      // Script para intervir nos botões do site gerado pelo Dualite
      // Isso garante que os links apontem para os lugares corretos sem mexer no JS minificado
      document.addEventListener('DOMContentLoaded', () => {
        const WHATSAPP_URL = "https://api.whatsapp.com/send/?phone=556281838006&text=Olá! Vim através do site institucional e gostaria de agendar uma consulta.";
        const FUNNEL_URL = "./jornada/index.html";

        const observer = new MutationObserver((mutations) => {
          // Procura por botões ou links com textos específicos
          const links = document.querySelectorAll('a, button');
          links.forEach(el => {
            const text = el.innerText.toLowerCase();
            
            // Redireciona botões de Agendar/WhatsApp
            if (text.includes('agendar') || text.includes('whatsapp')) {
              if (el.tagName === 'A') {
                el.href = WHATSAPP_URL;
              } else {
                el.onclick = () => window.location.href = WHATSAPP_URL;
              }
            }

            // Se houver algum botão para a "Jornada" ou similar, aponta para o funil
            if (text.includes('jornada') || text.includes('desperte')) {
              if (el.tagName === 'A') {
                el.href = FUNNEL_URL;
              } else {
                el.onclick = () => window.location.href = FUNNEL_URL;
              }
            }
          });
        });

        observer.observe(document.body, { childList: true, subtree: true });
      });
    </script>
  </body>
</html>
